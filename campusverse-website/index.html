<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusVerse - Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
    <i class="fas fa-sun"></i>
  </button>

  <!-- Background Shapes -->
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <!-- Main Content -->
  <div class="login-container">
    <div class="logo">
      <h1>CampusVerse</h1>
      <p>Virtual College Platform</p>
    </div>

    <div class="glass-card login-card" id="login-card" data-animate>
      <h2>Welcome Back</h2>
      <p>Join the future of education</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="glass-input" placeholder="your.email@college.edu" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="glass-input" placeholder="Enter your password" required>
        </div>

        <div class="form-group">
          <label for="college-id">College ID</label>
          <input type="text" id="college-id" name="college-id" class="glass-input" placeholder="Your college ID">
        </div>

        <button type="submit" class="neon-btn full-width">Join CampusVerse</button>
      </form>

      <div class="signup-link">
        <p>Don't have an account? <a href="#" onclick="showSignup()">Sign up</a></p>
      </div>
    </div>

    <div class="glass-card signup-card" id="signup-card" style="display: none;" data-animate>
      <h2>Create Account</h2>
      <p>Start your journey with CampusVerse</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" name="name" class="glass-input" placeholder="Your full name" required>
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" class="glass-input" placeholder="your.email@college.edu" required>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" class="glass-input" placeholder="Create a password" required>
        </div>

        <div class="form-group">
          <label for="signup-college-id">College ID</label>
          <input type="text" id="signup-college-id" name="college-id" class="glass-input" placeholder="Your college ID" required>
        </div>

        <button type="submit" class="neon-btn full-width">Create Account</button>
      </form>

      <div class="login-link">
        <p>Already have an account? <a href="#" onclick="showLogin()">Log in</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function showSignup() {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('signup-card').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('signup-card').style.display = 'none';
      document.getElementById('login-card').style.display = 'block';
    }
  </script>

  <style>
    .background-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
      opacity: 0.1;
      animation: float 6s ease-in-out infinite;
    }

    .shape-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .shape-2 {
      width: 200px;
      height: 200px;
      top: 60%;
      right: 10%;
      animation-delay: 2s;
    }

    .shape-3 {
      width: 150px;
      height: 150px;
      bottom: 20%;
      left: 50%;
      animation-delay: 4s;
    }

    .shape-4 {
      width: 100px;
      height: 100px;
      top: 30%;
      right: 30%;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 3rem;
      background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .logo p {
      color: var(--text-secondary);
      font-size: 1.2rem;
    }

    .login-card, .signup-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .full-width {
      width: 100%;
    }

    .signup-link, .login-link {
      margin-top: 20px;
    }

    .signup-link a, .login-link a {
      color: var(--neon-blue);
      text-decoration: none;
    }

    .signup-link a:hover, .login-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-card, .signup-card {
        padding: 20px;
      }

      .logo h1 {
        font-size: 2rem;
      }
    }
  </style>
</body>
</html>
